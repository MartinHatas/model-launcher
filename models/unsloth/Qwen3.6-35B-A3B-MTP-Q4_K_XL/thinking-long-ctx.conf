# Qwen3.6-35B-A3B-MTP (UD-Q4_K_XL, MoE) — Thinking, long-context (131k with CPU-MoE offload)
# Per Unsloth Qwen3.6 MTP guide: https://unsloth.ai/docs/models/qwen3.6#mtp-guide
# Optimized for MacBook M3 Pro 36GB (wired_limit_mb=30720)
#
# MTP self-speculative decoding (see thinking.conf for full notes):
#   MTP=on / SPEC_DRAFT_N_MAX=2 -> --spec-type draft-mtp --spec-draft-n-max 2
#   N_PARALLEL=1               -> MTP requires a single slot (-np>1 unsupported).
#
# N_CPU_MOE=10 offloads experts of the first 10 layers to CPU. The non-MTP base
# long-ctx profile uses 8; bumped +2 here to absorb MTP's ~1 GB extra footprint
# (21.3 GB build + draft head) at 131k. Expected decode penalty ~18% vs perf —
# but MTP's speedup more than offsets it. If bench.sh shows headroom, lower toward
# 8; if OOM, raise toward 12 or lower CACHE_TYPE_V to q4_0.
CTX_SIZE=131072
N_PREDICT=32768
TEMP=0.6
TOP_P=0.95
TOP_K=20
MIN_P=0.0
# Loop-break mitigations layered on Qwen's WebDev preset (pp=0.0, rp=1.0):
# pp=0.3 and rp=1.05 nudge just enough to break tight repetition cycles;
# REASONING_BUDGET=16384 caps thinking block before long-budget drift sets in.
PRESENCE_PENALTY=0.3
REPEAT_PENALTY=1.05
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
BATCH_SIZE=4096
UBATCH_SIZE=2048
GPU_LAYERS=99
THREADS=6
N_CPU_MOE=10
REASONING=on
REASONING_BUDGET=16384
CHAT_TEMPLATE_KWARGS='{"enable_thinking":true}'
MTP=on
SPEC_DRAFT_N_MAX=2
N_PARALLEL=1
PORT=8001
