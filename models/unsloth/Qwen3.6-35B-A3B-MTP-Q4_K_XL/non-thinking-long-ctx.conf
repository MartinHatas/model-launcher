# Qwen3.6-35B-A3B-MTP (UD-Q4_K_XL, MoE) — Non-thinking, long-context (131k with CPU-MoE offload)
# Per Unsloth Qwen3.6 MTP guide: https://unsloth.ai/docs/models/qwen3.6#mtp-guide
# Optimized for MacBook M3 Pro 36GB (wired_limit_mb=30720)
#
# MTP self-speculative decoding (see thinking.conf for full notes):
#   MTP=on / SPEC_DRAFT_N_MAX=2 -> --spec-type draft-mtp --spec-draft-n-max 2
#   N_PARALLEL=1               -> MTP requires a single slot (-np>1 unsupported).
#
# N_CPU_MOE=10 offloads experts of the first 10 layers to CPU. The non-MTP base
# long-ctx profile uses 8; bumped +2 here to absorb MTP's ~1 GB extra footprint
# at 131k. If bench.sh shows headroom, lower toward 8; if OOM, raise toward 12 or
# lower CACHE_TYPE_V to q4_0.
CTX_SIZE=131072
N_PREDICT=32768
TEMP=0.7
TOP_P=0.8
TOP_K=20
MIN_P=0.0
PRESENCE_PENALTY=1.5
REPEAT_PENALTY=1.0
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
BATCH_SIZE=4096
UBATCH_SIZE=2048
GPU_LAYERS=99
THREADS=6
N_CPU_MOE=10
REASONING=off
REASONING_BUDGET=0
CHAT_TEMPLATE_KWARGS='{"enable_thinking":false}'
MTP=on
SPEC_DRAFT_N_MAX=2
N_PARALLEL=1
PORT=8001
