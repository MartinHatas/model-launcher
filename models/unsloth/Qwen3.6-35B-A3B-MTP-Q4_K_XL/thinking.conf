# Qwen3.6-35B-A3B-MTP (UD-Q4_K_XL, MoE) — Thinking mode, perf profile (<=65k ctx, no CPU-MoE offload)
# Per Unsloth Qwen3.6 MTP guide: https://unsloth.ai/docs/models/qwen3.6#mtp-guide
# Optimized for MacBook M3 Pro 36GB (wired_limit_mb=30720)
# Use *-long-ctx.conf for ctx > 65k
#
# MTP (Multi-Token Prediction): the GGUF's embedded MTP head drafts N tokens, the
# main model verifies them in one parallel pass — faster generation, no accuracy
# loss. MoE models gain less than dense (~1.15-1.25x vs 1.4-2x) but still worth it.
#   MTP=on             -> --spec-type draft-mtp
#   SPEC_DRAFT_N_MAX=2 -> --spec-draft-n-max 2  (Unsloth's sweet spot; acceptance
#                         drops 83% @2 -> 50% @4. Try 1-6, keep the fastest.)
#   N_PARALLEL=1       -> MTP requires a single slot; -np>1 / --mmproj unsupported.
# MTP costs ~1 GB extra RAM/VRAM (this build is 21.3 GB vs 20.8 GB base). At 65k
# the hybrid-attention KV footprint is small, so N_CPU_MOE=0 still fits 30 GB.
CTX_SIZE=65536
N_PREDICT=32768
TEMP=0.6
TOP_P=0.95
TOP_K=20
MIN_P=0.0
# Loop-break mitigations layered on Qwen's WebDev preset (pp=0.0, rp=1.0):
# pp=0.3 and rp=1.05 nudge just enough to break tight repetition cycles;
# REASONING_BUDGET=8192 caps thinking block before long-budget drift sets in.
PRESENCE_PENALTY=0.3
REPEAT_PENALTY=1.05
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
BATCH_SIZE=4096
UBATCH_SIZE=2048
GPU_LAYERS=99
THREADS=6
N_CPU_MOE=0
REASONING=on
REASONING_BUDGET=8192
CHAT_TEMPLATE_KWARGS='{"enable_thinking":true}'
MTP=on
SPEC_DRAFT_N_MAX=2
N_PARALLEL=1
PORT=8001
