# Qwen3.6-35B-A3B-MTP (UD-Q4_K_XL, MoE) — Non-thinking, perf profile (<=65k ctx, no CPU-MoE offload)
# Per Unsloth Qwen3.6 MTP guide: https://unsloth.ai/docs/models/qwen3.6#mtp-guide
# Optimized for MacBook M3 Pro 36GB (wired_limit_mb=30720)
# Use *-long-ctx.conf for ctx > 65k
#
# MTP (Multi-Token Prediction): embedded MTP head drafts N tokens, verified in one
# parallel pass — faster generation, no accuracy loss. See thinking.conf for notes.
#   MTP=on / SPEC_DRAFT_N_MAX=2 -> --spec-type draft-mtp --spec-draft-n-max 2
#   N_PARALLEL=1               -> MTP requires a single slot (-np>1 unsupported).
CTX_SIZE=65536
N_PREDICT=32768
TEMP=0.7
TOP_P=0.8
TOP_K=20
MIN_P=0.0
PRESENCE_PENALTY=1.5
REPEAT_PENALTY=1.0
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
BATCH_SIZE=4096
UBATCH_SIZE=2048
GPU_LAYERS=99
THREADS=6
N_CPU_MOE=0
REASONING=off
REASONING_BUDGET=0
CHAT_TEMPLATE_KWARGS='{"enable_thinking":false}'
MTP=on
SPEC_DRAFT_N_MAX=2
N_PARALLEL=1
PORT=8001
