# Qwen3.6-35B-A3B (UD-Q4_K_XL) — Non-thinking, long-context, tuned for plan-executing skill
# Per Unsloth recommendations: https://unsloth.ai/docs/models/qwen3.6
# Optimized for MacBook M3 Pro 36GB (wired_limit_mb=30720)
#
# Workload: pi children executing PLAN.md tasks (handoff -> implementation ->
# self-verify AC -> internal retry until pass or 30-min outer wall-clock).
# Outer pi orchestrates with /compact at task boundary. All processes hit the
# same llama-server, so we want the same prefix-matching KV cache to be reused
# across many fresh `pi --print` invocations.
#
# Why non-thinking: the planner already decided architecture, contracts, and
# step signatures — the worker fills in bodies and verifies AC. That's a
# directed task, not a deliberation task. Non-thinking is ~2-3x faster than
# thinking for code generation, which means more AC retry iterations fit
# inside the 30-min wall clock. Thinking budget would also risk drift on
# what is already a well-scoped problem.
#
# Tweaks vs non-thinking-long-ctx.conf:
# - N_PARALLEL=2 so outer pi and child pi land in distinct llama.cpp slots
#   with independent KV cache. Prevents outer-vs-child context switches from
#   evicting the children's stable handoff prefix.
# - Sampling, penalties, KV cache types, batch sizes, GPU layers, threads,
#   N_CPU_MOE all match non-thinking-long-ctx exactly. The Unsloth WebDev
#   loop-break baseline (PRESENCE_PENALTY=1.5, REPEAT_PENALTY=1.0) already
#   covers the loop-break risk in retry cycles.
#
# N_CPU_MOE=8 offloads experts of the first 8 layers to CPU to free ~2.4 GB GPU
# memory for the 131k context. Expected decode tok/s penalty: ~15% vs perf.
# CACHE_TYPE_K/V=q8_0 keeps KV compact for prefix-match reuse across child
# invocations sharing the stable handoff Sections 1, 2, 4.
CTX_SIZE=131072
N_PREDICT=32768
TEMP=0.7
TOP_P=0.8
TOP_K=20
MIN_P=0.0
PRESENCE_PENALTY=1.5
REPEAT_PENALTY=1.0
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
BATCH_SIZE=4096
UBATCH_SIZE=2048
GPU_LAYERS=99
THREADS=6
N_CPU_MOE=8
REASONING=off
REASONING_BUDGET=0
CHAT_TEMPLATE_KWARGS='{"enable_thinking":false}'
N_PARALLEL=2
PORT=8001
