# Qwen3.6-27B (Q5_K_M, dense) — Thinking, long-context (131k)
# Per Unsloth recommendations: https://unsloth.ai/docs/models/qwen3.6
# Optimized for MacBook M3 Pro 36GB (wired_limit_mb=30720)
# Dense model: no MoE experts to offload — only knob is KV-cache pressure.
# Memory budget at 131k: ~20 GB model + KV cache (q8_0/q8_0) — verify with bench.sh.
# If OOM or thrashing, drop CTX_SIZE or lower CACHE_TYPE_V to q4_0.
CTX_SIZE=131072
N_PREDICT=32768
TEMP=0.6
TOP_P=0.95
TOP_K=20
MIN_P=0.0
# Loop-break mitigations layered on Qwen's precise-coding preset (pp=0.0, rp=1.0):
# pp=0.3 and rp=1.05 nudge just enough to break tight repetition cycles;
# REASONING_BUDGET=16384 caps thinking block before long-budget drift sets in.
PRESENCE_PENALTY=0.3
REPEAT_PENALTY=1.05
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
BATCH_SIZE=4096
UBATCH_SIZE=2048
GPU_LAYERS=99
THREADS=6
N_CPU_MOE=0
REASONING=on
REASONING_BUDGET=16384
CHAT_TEMPLATE_KWARGS='{"enable_thinking":true}'
PORT=8001
