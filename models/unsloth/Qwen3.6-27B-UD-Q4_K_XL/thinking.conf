# Qwen3.6-27B (Q5_K_M, dense) — Thinking mode, perf profile (<=65k ctx)
# Per Unsloth recommendations: https://unsloth.ai/docs/models/qwen3.6
# Optimized for MacBook M3 Pro 36GB (wired_limit_mb=30720)
# Use *-long-ctx.conf for ctx > 65k
# Dense model: N_CPU_MOE is N/A; long-ctx tradeoff is purely KV-cache pressure.
CTX_SIZE=65536
N_PREDICT=32768
TEMP=0.6
TOP_P=0.95
TOP_K=20
MIN_P=0.0
# Loop-break mitigations layered on Qwen's precise-coding preset (pp=0.0, rp=1.0):
# pp=0.3 and rp=1.05 nudge just enough to break tight repetition cycles;
# REASONING_BUDGET=8192 caps thinking block before long-budget drift sets in.
PRESENCE_PENALTY=0.3
REPEAT_PENALTY=1.05
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
BATCH_SIZE=4096
UBATCH_SIZE=2048
GPU_LAYERS=99
THREADS=6
N_CPU_MOE=0
REASONING=on
REASONING_BUDGET=8192
CHAT_TEMPLATE_KWARGS='{"enable_thinking":true}'
PORT=8001
