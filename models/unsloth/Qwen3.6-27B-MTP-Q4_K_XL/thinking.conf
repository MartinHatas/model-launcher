# Qwen3.6-27B-MTP (UD-Q4_K_XL, dense) — Thinking mode, perf profile (<=65k ctx)
# Per Unsloth Qwen3.6 MTP guide: https://unsloth.ai/docs/models/qwen3.6#mtp-guide
# Optimized for MacBook M3 Pro 36GB (wired_limit_mb=30720)
# Use *-long-ctx.conf for ctx > 65k
#
# MTP (Multi-Token Prediction): the GGUF's embedded MTP head drafts N tokens, the
# main model verifies them in one parallel pass — ~1.4-2x faster generation with
# no accuracy loss. Dense models benefit most (1.4-2x vs 1.15-1.25x for MoE).
#   MTP=on             -> --spec-type draft-mtp
#   SPEC_DRAFT_N_MAX=2 -> --spec-draft-n-max 2  (Unsloth's sweet spot; acceptance
#                         rate falls off a cliff past 2 — 83% @2 vs 50% @4. Try
#                         1-6 and keep whatever is fastest on your box.)
#   N_PARALLEL=1       -> MTP requires a single slot; -np>1 / --mmproj unsupported.
# MTP costs ~1 GB extra RAM/VRAM vs the base GGUF, but this Q4 (16.7 GB) is ~2 GB
# lighter than the Q5 27B base, so headroom is comfortable.
# Dense model: N_CPU_MOE is N/A; long-ctx tradeoff is purely KV-cache pressure.
CTX_SIZE=65536
N_PREDICT=32768
TEMP=0.6
TOP_P=0.95
TOP_K=20
MIN_P=0.0
# Loop-break mitigations layered on Qwen's precise-coding preset (pp=0.0, rp=1.0):
# pp=0.3 and rp=1.05 nudge just enough to break tight repetition cycles;
# REASONING_BUDGET=8192 caps thinking block before long-budget drift sets in.
PRESENCE_PENALTY=0.3
REPEAT_PENALTY=1.05
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
BATCH_SIZE=4096
UBATCH_SIZE=2048
GPU_LAYERS=99
THREADS=6
N_CPU_MOE=0
REASONING=on
REASONING_BUDGET=8192
CHAT_TEMPLATE_KWARGS='{"enable_thinking":true}'
MTP=on
SPEC_DRAFT_N_MAX=2
N_PARALLEL=1
PORT=8001
